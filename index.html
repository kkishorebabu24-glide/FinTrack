<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My FinTrack</title>
  <!-- PWA manifest (inline) -->
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22FinTrack%22%2C%22short_name%22%3A%22FinTrack%22%2C%22start_url%22%3A%22.%2Ffitrack.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23ffffff%22%2C%22theme_color%22%3A%22%232c3e50%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'45'%20fill%3D'%232c3e50'%2F%3E%3Ctext%20x%3D'50'%20y%3D'55'%20text-anchor%3D'middle'%20fill%3D'white'%20font-size%3D'20'%20font-family%3D'sans-serif'%3E%E2%82%B9%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color:#333; padding:1rem; max-width:900px; margin:0 auto; }
    h1 { font-weight:600; color:#2c3e50; }
    .tabs { display:flex; gap:0.5rem; margin:1.5rem 0 1rem; flex-wrap:wrap; }
    .tab { padding:0.5rem 1.2rem; border-radius:8px; background:#e0e0e0; border:none; cursor:pointer; font-size:0.95rem; transition:0.2s; }
    .tab.active { background:#2c3e50; color:#fff; }
    .panel { display:none; }
    .panel.active { display:block; }
    .card { background:#fff; padding:1.2rem; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.05); margin-bottom:1rem; }
    .grid2 { display:grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap:1rem; }
    .stat { background:#fafafa; padding:1rem; border-radius:8px; text-align:center; }
    .stat .label { font-size:0.8rem; color:#666; }
    .stat .value { font-size:1.6rem; font-weight:600; color:#2c3e50; }
    form { display:flex; flex-wrap:wrap; gap:0.5rem; align-items:end; margin-bottom:1rem; }
    input, select, button { padding:0.6rem; border-radius:6px; border:1px solid #ccc; font-size:0.9rem; }
    button { background:#2c3e50; color:white; border:none; cursor:pointer; }
    button:hover { opacity:0.9; }
    ul { list-style:none; }
    li { display:flex; justify-content:space-between; align-items:center; padding:0.6rem 0; border-bottom:1px solid #eee; }
    .done { text-decoration: line-through; color:#999; }
    .progress-bar { height:8px; background:#e0e0e0; border-radius:4px; margin-top:4px; overflow:hidden; }
    .progress-fill { height:100%; background:#27ae60; border-radius:4px; transition:width 0.3s; }
    .check-item { display:flex; justify-content:space-between; align-items:center; padding:0.5rem 0; }
    canvas { max-width:100%; }
  </style>
</head>
<body>
  <h1>💰 My FinTrack</h1>

  <div class="tabs">
    <button class="tab active" data-panel="dashboard">Dashboard</button>
    <button class="tab" data-panel="expenses">Daily Expenses</button>
    <button class="tab" data-panel="chores">Chores</button>
    <button class="tab" data-panel="savingsCheck">Savings Checklist</button>
    <button class="tab" data-panel="goals">Future Goals</button>
  </div>

  <div id="dashboard" class="panel active">
    <div class="grid2" id="summaryCards"></div>
    <div class="card" style="margin-top:1rem;">
      <h3 style="margin-bottom:0.5rem;">Monthly Income vs Expense</h3>
      <canvas id="trendChart" height="200"></canvas>
    </div>
  </div>

  <div id="expenses" class="panel">
    <div class="card">
      <h3>Add Expense</h3>
      <form id="expenseForm">
        <input type="date" id="expDate" required>
        <select id="expCategory">
          <option>Food</option><option>Transport</option><option>Bills</option><option>Entertainment</option><option>Shopping</option><option>Health</option><option>Other</option>
        </select>
        <input type="number" id="expAmount" placeholder="Amount" step="0.01" required>
        <input type="text" id="expNote" placeholder="Note (optional)">
        <button type="submit">+ Add</button>
      </form>
      <h3>Recent Expenses</h3>
      <ul id="expenseList"></ul>
    </div>
    <div class="card">
      <h3>Add Income</h3>
      <form id="incomeForm">
        <input type="date" id="incDate" required>
        <input type="number" id="incAmount" placeholder="Amount" step="0.01" required>
        <input type="text" id="incSource" placeholder="Source">
        <button type="submit">+ Add</button>
      </form>
    </div>
  </div>

  <div id="chores" class="panel">
    <div class="card">
      <h3>Daily Chores</h3>
      <form id="choreForm">
        <input type="text" id="choreInput" placeholder="New chore..." required>
        <button type="submit">+ Add</button>
      </form>
      <ul id="choreList"></ul>
    </div>
  </div>

  <div id="savingsCheck" class="panel">
    <div class="card">
      <h3>Indian Personal Finance & Government Scheme Checklist</h3>
      <p style="font-size:0.85rem; color:#555; margin-bottom:0.8rem;">Tick when you've met the target or set up the scheme.</p>
      <div id="criteriaList"></div>
    </div>
  </div>

  <div id="goals" class="panel">
    <div class="card">
      <h3>Future Savings Goals</h3>
      <form id="goalForm">
        <input type="text" id="goalName" placeholder="Goal name" required>
        <input type="number" id="goalTarget" placeholder="Target ₹" step="1" required>
        <input type="number" id="goalCurrent" placeholder="Current ₹" step="1" value="0">
        <input type="date" id="goalDeadline">
        <button type="submit">+ Add</button>
      </form>
      <ul id="goalList"></ul>
    </div>
  </div>

  <script>
    // ---------- PWA SERVICE WORKER REGISTRATION ----------
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          const CACHE_NAME = 'fintrack-v1';
          const ASSETS = [
            self.location.href,
            'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js'
          ];
          self.addEventListener('install', e => {
            e.waitUntil(
              caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS))
            );
          });
          self.addEventListener('fetch', e => {
            e.respondWith(
              caches.match(e.request).then(cached => cached || fetch(e.request))
            );
          });
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl)
          .catch(err => console.log('SW registration failed (may need https/localhost)', err));
      });
    }

    // ---------- LOCAL STORAGE HELPERS ----------
    const STORAGE_KEYS = {
      expenses: 'ft_expenses',
      income: 'ft_income',
      chores: 'ft_chores',
      criteria: 'ft_criteria',
      goals: 'ft_goals'
    };

    function loadData(key, fallback) {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }

    function saveData(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }

    // Default savings criteria (Indian context)
    const DEFAULT_CRITERIA = [
      { id:1, name:'Emergency Fund (6 months expenses)', achieved: false, target: 0, current:0 },
      { id:2, name:'Health Insurance (family floater)', achieved: false, target: 1, current:0 },
      { id:3, name:'Term Life Insurance', achieved: false, target: 1, current:0 },
      { id:4, name:'PPF Account (Public Provident Fund)', achieved: false, target: 1, current:0 },
      { id:5, name:'NPS (National Pension System)', achieved: false, target: 1, current:0 },
      { id:6, name:'Sukanya Samriddhi Yojana (if applicable)', achieved: false, target: 1, current:0 },
      { id:7, name:'Atal Pension Yojana', achieved: false, target: 1, current:0 },
      { id:8, name:'Pradhan Mantri Jeevan Jyoti Bima Yojana', achieved: false, target: 1, current:0 },
      { id:9, name:'Pradhan Mantri Suraksha Bima Yojana', achieved: false, target: 1, current:0 },
      { id:10, name:'Fixed Deposit / Debt fund for short-term goals', achieved: false, target: 1, current:0 }
    ];

    // ---------- INITIALISE DATA ----------
    let expenses = loadData(STORAGE_KEYS.expenses, []);
    let incomeEntries = loadData(STORAGE_KEYS.income, []);
    let chores = loadData(STORAGE_KEYS.chores, []);
    let criteria = loadData(STORAGE_KEYS.criteria, DEFAULT_CRITERIA);
    let goals = loadData(STORAGE_KEYS.goals, []);

    // ---------- UI RENDERING ----------
    function renderAll() {
      renderDashboard();
      renderExpenses();
      renderChores();
      renderCriteria();
      renderGoals();
    }

    // --- Dashboard ---
    let trendChart;
    function renderDashboard() {
      const now = new Date();
      const currentMonth = now.getMonth();
      const currentYear = now.getFullYear();

      const monthlyExpenses = expenses.filter(e => {
        const d = new Date(e.date);
        return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
      }).reduce((sum, e) => sum + parseFloat(e.amount), 0);

      const monthlyIncome = incomeEntries.filter(e => {
        const d = new Date(e.date);
        return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
      }).reduce((sum, e) => sum + parseFloat(e.amount), 0);

      const totalExp = expenses.reduce((s,e) => s + parseFloat(e.amount), 0);
      const totalInc = incomeEntries.reduce((s,e) => s + parseFloat(e.amount), 0);
      const net = totalInc - totalExp;

      document.getElementById('summaryCards').innerHTML = `
        <div class="stat"><div class="label">Month Income</div><div class="value">₹${monthlyIncome.toLocaleString()}</div></div>
        <div class="stat"><div class="label">Month Expenses</div><div class="value">₹${monthlyExpenses.toLocaleString()}</div></div>
        <div class="stat"><div class="label">Month Savings</div><div class="value">₹${(monthlyIncome-monthlyExpenses).toLocaleString()}</div></div>
        <div class="stat"><div class="label">Net Worth</div><div class="value">₹${net.toLocaleString()}</div></div>
      `;

      const months = [];
      const incomeByMonth = [];
      const expenseByMonth = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date(currentYear, currentMonth - i, 1);
        const m = d.getMonth();
        const y = d.getFullYear();
        const monthLabel = d.toLocaleString('default', { month:'short', year:'numeric' });
        months.push(monthLabel);

        const inc = incomeEntries.filter(e => {
          const dt = new Date(e.date);
          return dt.getMonth() === m && dt.getFullYear() === y;
        }).reduce((s,e) => s + parseFloat(e.amount), 0);
        const exp = expenses.filter(e => {
          const dt = new Date(e.date);
          return dt.getMonth() === m && dt.getFullYear() === y;
        }).reduce((s,e) => s + parseFloat(e.amount), 0);
        incomeByMonth.push(inc);
        expenseByMonth.push(exp);
      }

      const ctx = document.getElementById('trendChart').getContext('2d');
      if (trendChart) trendChart.destroy();
      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: months,
          datasets: [
            { label: 'Income', data: incomeByMonth, borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,0.1)', tension: 0.2 },
            { label: 'Expenses', data: expenseByMonth, borderColor: '#e74c3c', backgroundColor: 'rgba(231,76,60,0.1)', tension: 0.2 }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { position:'bottom' } },
          scales: { y: { beginAtZero: true, ticks: { callback: v => '₹'+v } } }
        }
      });
    }

    // --- Expenses ---
    function renderExpenses() {
      const list = document.getElementById('expenseList');
      const sorted = [...expenses].sort((a,b) => new Date(b.date) - new Date(a.date));
      list.innerHTML = sorted.slice(0,15).map(e => `
        <li>
          <span>${e.date} – ${e.category} – ₹${parseFloat(e.amount).toFixed(2)} ${e.note ? '('+e.note+')' : ''}</span>
          <button onclick="deleteExpense('${e.id}')" style="background:#c0392b; padding:0.3rem 0.6rem;">✕</button>
        </li>
      `).join('');
    }

    window.deleteExpense = function(id) {
      expenses = expenses.filter(e => e.id !== id);
      saveData(STORAGE_KEYS.expenses, expenses);
      renderAll();
    };

    document.getElementById('expenseForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const exp = {
        id: Date.now().toString(),
        date: document.getElementById('expDate').value,
        category: document.getElementById('expCategory').value,
        amount: parseFloat(document.getElementById('expAmount').value),
        note: document.getElementById('expNote').value
      };
      expenses.push(exp);
      saveData(STORAGE_KEYS.expenses, expenses);
      this.reset();
      document.getElementById('expDate').value = new Date().toISOString().slice(0,10);
      renderAll();
    });

    document.getElementById('incomeForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const inc = {
        id: Date.now().toString(),
        date: document.getElementById('incDate').value,
        amount: parseFloat(document.getElementById('incAmount').value),
        source: document.getElementById('incSource').value
      };
      incomeEntries.push(inc);
      saveData(STORAGE_KEYS.income, incomeEntries);
      this.reset();
      document.getElementById('incDate').value = new Date().toISOString().slice(0,10);
      renderAll();
    });

    // --- Chores ---
    function renderChores() {
      const list = document.getElementById('choreList');
      list.innerHTML = chores.map(c => `
        <li>
          <span class="${c.done ? 'done' : ''}" onclick="toggleChore('${c.id}')" style="cursor:pointer;">${c.task}</span>
          <button onclick="deleteChore('${c.id}')" style="background:#c0392b; padding:0.3rem 0.6rem;">✕</button>
        </li>
      `).join('');
    }

    window.toggleChore = function(id) {
      const chore = chores.find(c => c.id === id);
      if (chore) { chore.done = !chore.done; }
      saveData(STORAGE_KEYS.chores, chores);
      renderChores();
    };

    window.deleteChore = function(id) {
      chores = chores.filter(c => c.id !== id);
      saveData(STORAGE_KEYS.chores, chores);
      renderChores();
    };

    document.getElementById('choreForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const task = document.getElementById('choreInput').value.trim();
      if (task) {
        chores.push({ id: Date.now().toString(), task, done: false });
        saveData(STORAGE_KEYS.chores, chores);
        document.getElementById('choreInput').value = '';
        renderChores();
      }
    });

    // --- Savings Criteria ---
    function renderCriteria() {
      const container = document.getElementById('criteriaList');
      container.innerHTML = criteria.map(c => `
        <div class="check-item">
          <label style="flex:1;">
            <input type="checkbox" ${c.achieved ? 'checked' : ''} onchange="toggleCriteria('${c.id}')">
            ${c.name}
          </label>
          <span style="font-size:0.8rem; color:#666;">${c.achieved ? '✔ Done' : 'Pending'}</span>
        </div>
      `).join('');
    }

    window.toggleCriteria = function(id) {
      const item = criteria.find(c => c.id == id);
      if (item) { item.achieved = !item.achieved; }
      saveData(STORAGE_KEYS.criteria, criteria);
      renderCriteria();
    };

    // --- Future Goals ---
    function renderGoals() {
      const list = document.getElementById('goalList');
      list.innerHTML = goals.map(g => {
        const progress = g.target > 0 ? Math.min((g.current / g.target) * 100, 100) : 0;
        return `
          <li style="flex-direction:column; align-items:stretch;">
            <div style="display:flex; justify-content:space-between;">
              <strong>${g.name}</strong>
              <span>₹${g.current} / ₹${g.target} ${g.deadline ? '(by '+g.deadline+')' : ''}</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div>
            <div style="display:flex; gap:0.5rem; margin-top:4px;">
              <input type="number" placeholder="Update current" id="update-${g.id}" style="width:110px;">
              <button onclick="updateGoal('${g.id}')">Update</button>
              <button onclick="deleteGoal('${g.id}')" style="background:#c0392b;">✕</button>
            </div>
          </li>
        `;
      }).join('');
    }

    window.updateGoal = function(id) {
      const input = document.getElementById(`update-${id}`);
      const val = parseFloat(input.value);
      if (!isNaN(val)) {
        const goal = goals.find(g => g.id === id);
        if (goal) { goal.current = val; }
        saveData(STORAGE_KEYS.goals, goals);
        renderGoals();
      }
    };

    window.deleteGoal = function(id) {
      goals = goals.filter(g => g.id !== id);
      saveData(STORAGE_KEYS.goals, goals);
      renderGoals();
    };

    document.getElementById('goalForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const goal = {
        id: Date.now().toString(),
        name: document.getElementById('goalName').value,
        target: parseFloat(document.getElementById('goalTarget').value),
        current: parseFloat(document.getElementById('goalCurrent').value) || 0,
        deadline: document.getElementById('goalDeadline').value
      };
      goals.push(goal);
      saveData(STORAGE_KEYS.goals, goals);
      this.reset();
      renderGoals();
    });

    // ---------- TAB SWITCHING ----------
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
        document.getElementById(this.dataset.panel).classList.add('active');
        if (this.dataset.panel === 'dashboard') renderDashboard();
      });
    });

    // ---------- FIRST RENDER ----------
    renderAll();

    const today = new Date().toISOString().slice(0,10);
    document.getElementById('expDate').value = today;
    document.getElementById('incDate').value = today;
  </script>
</body>
</html>
